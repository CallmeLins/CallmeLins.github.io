# Site
site:
  favicon: /favicon.svg
  # Year the site was created; displayed in footer as "since–current"
  since: 2021
  # Whether to display the seal (stamp) in the header
  seal: true
  # Text displayed inside the seal stamp and favicon (single character recommended)
  seal_text: "林"
  rss:
    enabled: false
    path: /atom.xml

# Navigation menu
menu:
  - name: 首页
    url: /
  - name: 归档
    url: /archives
  - name: 分类
    url: /categories
  - name: 标签
    url: /tags
  - name: 搜索
    url: /search
  - name: 关于
    url: /about

# Excerpt settings
excerpt:
  fallback:
    enabled: true
    length: 200

# Table of Contents (TOC)
toc:
  enabled: true
  depth: 3
  min_headings: 3

# Dark mode
dark_mode:
  default: light
  toggle: true

# Reading progress bar
progress_bar:
  enabled: true

# Back to top button
back_to_top:
  enabled: true

# Comment systems
comments:
  enabled: false
  provider: giscus
  disqus:
    shortname: ""
  giscus:
    src: https://giscus.app/client.js
    repo: ""
    repo_id: ""
    category: ""
    category_id: ""
    mapping: pathname
    strict: 0
    reactions_enabled: 1
    emit_metadata: 0
    input_position: bottom
    lang: zh-CN
    theme: https://cdn.jsdelivr.net/npm/hexo-theme-shiro@1.4.0/source/css/giscus.css
    lazy_loading: false

# Analytics
analytics:
  google:
    enabled: false
    id: ""

# Site search powered by Pagefind (https://pagefind.app/)
search:
  enabled: true
  # force_language: zh
